name: Deploy to Staging Server

on:
  push:
    branches:
      - staging

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Install SSH and rsync
        run: sudo apt-get update && sudo apt-get install -y sshpass openssh-client rsync

      - name: Copy project to remote server via rsync
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete --exclude=".env" \
            -e "ssh -o StrictHostKeyChecking=no -p 22100" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_APP_PATH_STAGING }}/

      - name: Build and run Docker Compose on remote server (staging)
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 22100 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ${{ secrets.SSH_APP_PATH_STAGING }}

            echo "Criando arquivo .env de staging se não existir..."
            if [ ! -f ".env" ]; then
              echo "NODE_ENV=staging" >> .env
            fi

            echo "Removendo container antigo nestjs-api-staging se existir..."
            docker rm -f nestjs-api-staging || true

            echo "Subindo container com Docker Compose (staging)..."
            docker compose -f docker-compose-staging.yml up -d --build
          EOF
