name: Deploy Robo API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # AWS CREDENTIALS
      # =========================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      # =========================
      # LOGIN ECR
      # =========================
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # =========================
      # BUILD & PUSH IMAGE
      # =========================
      - name: Build and Push Docker image
        env:
          REGISTRY: 339340413604.dkr.ecr.us-east-2.amazonaws.com
          REPOSITORY: robo-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$REGISTRY/$REPOSITORY:$IMAGE_TAG

          docker build -t $IMAGE .
          docker push $IMAGE

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      # =========================
      # GET TASK DEFINITION FROM ECS
      # =========================
      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition robo-api \
            --query taskDefinition \
            --output json > task-definition.json

      # =========================
      # UPDATE IMAGE
      # =========================
      - name: Update task definition image
        run: |
          jq --arg IMAGE "${{ env.IMAGE }}" '
            .containerDefinitions[0].image = $IMAGE
            | del(.taskDefinitionArn)
            | del(.revision)
            | del(.status)
            | del(.requiresAttributes)
            | del(.compatibilities)
            | del(.registeredAt)
            | del(.registeredBy)
          ' task-definition.json > task-def-updated.json

      # =========================
      # DEPLOY ECS
      # =========================
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-def-updated.json
          service: robo-api-service
          cluster: robo-cluster
          wait-for-service-stability: true
